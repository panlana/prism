services:
  postgres:
    image: postgres:16-alpine
    container_name: prism_v4_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: prism_v4
      POSTGRES_USER: prisma
      POSTGRES_PASSWORD: prisma
    ports:
      - "5432:5432"
    volumes:
      - prism_v4_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prisma -d prism_v4"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  prism_v4_postgres_data:

